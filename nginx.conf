# nginx config INSIDE the static container (not your Nginx Proxy Manager).
# NPM terminates TLS and proxies to this on port 80.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/css application/javascript image/svg+xml application/json;

    # Hashed, immutable build assets -> cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the entry HTML, so a new deploy is picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Single-page app: fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
