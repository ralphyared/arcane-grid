# Automatic AI code review on every pull request, via Anthropic's official action.
#
# One-time setup (repo admin):
#   1. Install the Claude GitHub App:  https://github.com/apps/claude
#      (or run `/install-github-app` inside the `claude` terminal)
#   2. Add an ANTHROPIC_API_KEY repo secret:
#      gh secret set ANTHROPIC_API_KEY        (paste your key from console.anthropic.com)
#
# Note: for PRs opened from forks, GitHub withholds secrets, so the review only
# runs for branches pushed to this repo. That covers the normal solo/team flow.
name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request — the PR branch is already checked out.
            Run `gh pr diff` to see exactly what changed and review only that.

            Focus on, in priority order:
            - Correctness and likely bugs
            - Security implications
            - Performance
            - Fit with this project's conventions in CLAUDE.md, especially:
              the grid generator must stay deterministic and always solvable, and
              never call setState inside a React effect (use the documented
              render-phase / lazy-initializer patterns).

            Leave specific, actionable inline comments using the inline comment
            tool with confirmed: true. Then post one short top-level summary with
            `gh pr comment`. Be concise and do not nitpick formatting (Prettier and
            ESLint already gate that). If the PR looks good, say so plainly.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
            --model claude-sonnet-4-6
            --max-turns 20
