# Builds and deploys the static site to GitHub Pages.
# Enable once via: repo Settings → Pages → Source: "GitHub Actions".
name: Deploy to GitHub Pages

on:
  # Manual only: this project is self-hosted (Docker behind Nginx Proxy Manager),
  # so Pages deploys don't run on push. Enable Pages (Settings -> Pages -> Source:
  # GitHub Actions) and run this manually if you ever want a Pages mirror.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
